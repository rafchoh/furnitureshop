spring.application.name=furnitureshop
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/furniture_shop?useSSL=false&serverTimezone=UTC
#-------------------------------------------
#spring.jpa.hibernate.ddl-auto=create-drop
#spring.sql.init.mode=always
#-------------------------------------------
spring.datasource.username=root
spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.session.jdbc.initialize-schema=always

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
#logging.level.org.springframework.data.jpa=INFO
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Security
# (will be configured later)