<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

<div class="container mt-5">
    <h2>Login</h2>
    <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please log in.</div>
    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="mt-3">Don't have an account? <a href="/register">Register</a></p>
</div>

</main>
<div th:replace="~{fragments/footer}"></div>
