<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

    <div class="container mt-4">
        <h1 th:text="${furniture.name}">Name</h1>
        <div th:if="${imageBase64}">
            <img th:src="'data:image/jpeg;base64,' + ${imageBase64}" class="img-fluid" style="max-height:400px;">
        </div>
        <p><strong>Description:</strong> <span th:text="${furniture.description}">desc</span></p>
        <p><strong>Price:</strong> <span th:text="${#numbers.formatDecimal(furniture.price, 0, 'COMMA', 2, 'POINT')} + ' Euro'">0.00</span></p>
        <p><strong>Available:</strong> <span th:text="${furniture.available} ? 'Yes' : 'No'"></span></p>

        <form method="post" th:if="${furniture.available}" th:action="@{/cart/add/{id}(id=${furniture.id})}">
            <button type="submit" class="btn btn-success">ADD to Cart</button>
        </form>

        <div sec:authorize="hasRole('ADMIN')" class="mt-3 mb-3">
            <a th:href="@{/furniture/admin/{id}/edit(id=${furniture.id})}" class="btn btn-warning">Edit</a>
            <form method="post" th:action="@{/furniture/admin/{id}/delete(id=${furniture.id})}" style="display: inline;"
                  onsubmit="return confirm('Are you sure you want to delete this furniture?');">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>

        <a href="/" class="btn btn-secondary mb-3">Back to List</a>
    </div>

</main>
<div th:replace="~{fragments/footer}"></div>
