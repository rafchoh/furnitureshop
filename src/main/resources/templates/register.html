<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

    <div class="container mt-5">
        <h2 sec:authorize="!isAuthenticated()">Register</h2>
        <h2 sec:authorize="isAuthenticated()">Edit profile</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <form method="post" th:action="${#authorization.expression('!isAuthenticated()')} ? @{/register} : @{/profile/edit}" th:object="${userDTO}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" th:field="*{username}">
                <div th:errors="*{username}" class="text-danger"></div>
            </div>
            <div class="mb-3" sec:authorize="isAuthenticated()">
                <label class="form-label">Role</label>
                <select th:field="*{role}" class="form-select form-select-sm">
                    <option value="USER" th:selected="${role == 'USER'}">USER</option>
                    <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}">
                <div th:errors="*{email}" class="text-danger"></div>
            </div>
            <div class="mb-3" sec:authorize="isAuthenticated()">
                <label class="form-label"> New Password (Only when changing password!!!)</label>
                <input type="password" class="form-control" th:field="*{newPassword}">
                <div th:errors="*{newPassword}" class="text-danger"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" th:field="*{password}">
                <div th:errors="*{password}" class="text-danger"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" th:field="*{confirmPassword}">
                <div th:errors="*{confirmPassword}" class="text-danger"></div>
            </div>
            <button type="submit" class="btn btn-primary" sec:authorize="!isAuthenticated()">Register</button>
            <button type="submit" class="btn btn-primary" sec:authorize="isAuthenticated()" onsubmit="return confirm('Are you sure you want to continue?');">Edit</button>
        </form>
        <p class="mt-3" sec:authorize="!isAuthenticated()">Already have an account? <a href="/login">Login</a></p>
    </div>

</main>
<div th:replace="~{fragments/footer}"></div>
