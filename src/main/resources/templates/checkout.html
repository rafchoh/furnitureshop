<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

    <div class="container mt-4">
        <h2>Checkout</h2>

        <h5 class="mt-3">Items in your order</h5>
        <table class="table table-striped">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Price</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="f : ${furnitureList}">
                <td th:text="${f.name}"></td>
                <td th:text="${#numbers.formatDecimal(f.price, 0, 'COMMA', 2, 'POINT')} + ' $'"></td>
            </tr>
            </tbody>
            <tfoot class="table-secondary fw-bold">
            <tr>
                <td>Total</td>
                <td th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')} + ' $'"></td>
            </tr>
            </tfoot>
        </table>

        <hr>

        <h5>Delivery Details</h5>
        <form method="post" th:action="@{/cart/checkout}" th:object="${checkoutDTO}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Booking Date</label>
                <input type="date" class="form-control" th:field="*{bookingDate}"
                       th:classappend="${#fields.hasErrors('bookingDate')} ? 'is-invalid'">
                <div th:errors="*{bookingDate}" class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Delivery Address</label>
                <input type="text" class="form-control" th:field="*{deliveryAddress}"
                       placeholder="Street, City, Postcode"
                       th:classappend="${#fields.hasErrors('deliveryAddress')} ? 'is-invalid'">
                <div th:errors="*{deliveryAddress}" class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Notes <span class="text-muted fw-normal">(optional)</span></label>
                <textarea class="form-control" rows="3" th:field="*{notes}"
                          placeholder="Any special delivery instructions..."
                          th:classappend="${#fields.hasErrors('notes')} ? 'is-invalid'"></textarea>
                <div th:errors="*{notes}" class="invalid-feedback"></div>
            </div>

            <div class="d-flex gap-2">
                <a href="/cart" class="btn btn-secondary">Back to Cart</a>
                <button type="submit" class="btn btn-success">Place Booking</button>
            </div>
        </form>
    </div>

</main>
<div th:replace="~{fragments/footer}"></div>
