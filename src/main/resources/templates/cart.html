<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

    <div class="container mt-4">
        <h2>Your Cart</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div th:if="${cartItems.empty}">
            <p class="text-muted">Your cart is empty.</p>
            <a href="/" class="btn btn-primary">Continue Shopping</a>
        </div>

        <div th:unless="${cartItems.empty}">
            <table class="table table-striped align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th class="text-end">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.furniture.name}"></td>
                    <td th:text="${#numbers.formatDecimal(item.furniture.price, 0, 'COMMA', 2, 'POINT')} + ' $'"></td>
                    <td class="text-end">
                        <form method="post" th:action="@{/cart/remove/{id}(id=${item.id})}">
                            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
                        </form>
                    </td>
                </tr>
                </tbody>
                <tfoot class="table-secondary fw-bold">
                <tr>
                    <td>Total</td>
                    <td th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 2, 'POINT')} + ' $'"></td>
                    <td></td>
                </tr>
                </tfoot>
            </table>

            <div class="mt-3 d-flex gap-2">
                <a href="/" class="btn btn-secondary">Continue Shopping</a>
                <a href="/cart/checkout" class="btn btn-success">Proceed to Checkout</a>
            </div>
        </div>
    </div>

</main>
<div th:replace="~{fragments/footer}"></div>
