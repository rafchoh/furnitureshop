<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

    <div class="container mt-4">
        <h2>My Bookings</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div th:if="${bookings.empty}">
            <p class="text-muted">You have no bookings yet.</p>
            <a href="/" class="btn btn-primary">Start Shopping</a>
        </div>

        <div th:unless="${bookings.empty}">
            <table class="table table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Booking Date</th>
                        <th>Delivery Address</th>
                        <th>Notes</th>
                        <th>Booked On</th>
                        <th>Status</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.furniture.name}"></td>
                        <td th:text="${#numbers.formatDecimal(booking.furniture.price, 0, 'COMMA', 2, 'POINT')} + ' $'"></td>
                        <td th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy')}"></td>
                        <td th:text="${booking.deliveryAddress}"></td>
                        <td th:text="${booking.notes != null ? booking.notes : '-'}"></td>
                        <td th:text="${#temporals.format(booking.createdAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td>
                                <span th:text="${booking.status}"
                                      th:classappend="${booking.status == 'CONFIRMED'} ? 'badge bg-success'
                                                   : (${booking.status == 'CANCELLED'} ? 'badge bg-danger' : 'badge bg-secondary')">
                                </span>
                        </td>
                        <td class="text-end">
                            <form th:if="${booking.status == 'CONFIRMED'}"
                                  method="post"
                                  th:action="@{/cart/bookings/{id}/cancel(id=${booking.id})}"
                                  onsubmit="return confirm('Cancel this booking?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Cancel</button>
                            </form>
                            <span th:unless="${booking.status == 'CONFIRMED'}" class="text-muted">—</span>
                        </td>
                    </tr>
                </tbody>
            </table>

            <a href="/" class="btn btn-primary mt-2">Continue Shopping</a>
        </div>
    </div>

</main>
<div th:replace="~{fragments/footer}"></div>
