<div th:replace="~{fragments/header}" xmlns:th="http://www.w3.org/1999/xhtml"></div>
<main class="main-content">

    <div class="container mt-4">
        <h2>My Profile</h2>
        <div th:if="${param.updated}" class="alert alert-success">Profile updated successfully!</div>
        <div class="card">
            <div class="card-body">
                <p><strong>Username:</strong> <span th:text="${user.username}"></span></p>
                <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                <p><strong>Role:</strong> <span th:text="${user.role}"></span></p>
            </div>
        </div>
        <div class="mt-3">
            <a th:href="@{'/profile/' + ${user.username}}" class="btn btn-primary">Edit Profile</a>
            <a href="/cart/bookings" class="btn btn-secondary">My Bookings</a>
            <form method="post" th:action="@{/logout}" style="display: inline;">
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>
        <a href="/" class="btn btn-link mt-3">Back to Store</a>
    </div>

</main>
<div th:replace="~{fragments/footer}"></div>
